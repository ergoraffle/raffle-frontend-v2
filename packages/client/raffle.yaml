openapi: 3.0.0
info:
  title: Raffle Service API
  version: 1.0.0

paths:
  /startup:
    get:
      summary: Get startup configuration
      responses:
        '200':
          description: Startup configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartupResponse'

  /info:
    get:
      summary: Get service information
      responses:
        '200':
          description: Service info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

  /raffles:
    get:
      summary: Get raffle summaries
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
        - in: query
          name: status
          schema:
            type: string
            enum: [active, successful, failed]
      responses:
        '200':
          description: Raffle list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RaffleSummaryResponse'

components:
  schemas:
    #######################
    # Startup
    #######################
    StartupResponse:
      type: object
      properties:
        txFee:
          type: integer
          x-faker: 150000
        version:
          type: string
          x-faker: '1.0.0'
        verifiedTokens:
          type: array
          items:
            $ref: '#/components/schemas/VerifiedToken'
      required: [txFee, version, verifiedTokens]

    VerifiedToken:
      type: object
      properties:
        tokenId:
          type: string
          x-faker: b2dcea48caf0e73309138d659f6eb69d7ec8793dee989670c72dd4ffde7ebeb3
        name:
          type: string
          x-faker: rsBTC
      required: [tokenId, name]

    #######################
    # Info
    #######################
    InfoResponse:
      type: object
      properties:
        lastBlockHeight:
          type: integer
          x-faker: 123456
        health:
          type: string
          x-faker: healthy
        serviceFee:
          type: integer
          description: Percentage * 10 (e.g. 30 = 3%)
          x-faker: 30
        implementerFee:
          type: integer
          description: Percentage * 10 (e.g. 20 = 2%)
          x-faker: 20
        creationFee:
          type: integer
          x-faker: 20000000000
      required:
        - lastBlockHeight
        - health
        - serviceFee
        - implementerFee
        - creationFee

    #######################
    # Raffles
    #######################
    RaffleSummaryResponse:
      type: object
      properties:
        total:
          type: integer
          x-faker: 23
        items:
          type: array
          items:
            $ref: '#/components/schemas/RaffleSummary'
      required: [total, items]

    RaffleSummary:
      type: object
      properties:
        raffleId:
          type: string
          x-faker: 22211bdba82c0251fed0a1301be40ae379790db99d769f291dceacdbc6a2fa7c
        name:
          type: string
          x-faker: Raffle 1
        description:
          type: string
          x-faker: Raffle 1 description
        image:
          type: string
          format: uri
          x-faker: https://x-faker.com/image.png
        collectingTokenId:
          type: string
        collectingTokenName:
          type: string
          minLength: 1
          maxLength: 5
          x-faker: rsBTC
        winnersCount:
          type: integer
          x-faker: 2
          minimum: 1
          maximum: 5
        giftCount:
          type: integer
          minimum: 1
          maximum: 5
          x-faker: 5
        tags:
          type: array
          items:
            type: string
        deadline:
          type: integer
          description: Unix timestamp (seconds)
          x-faker: 1718284800
        goal:
          type: integer
          minimum: 1
          maximum: 100
          x-faker: 1234567890
        ticketPrice:
          type: integer
          minimum: 1
          maximum: 100
          x-faker: 1000
        soldTicketCount:
          type: integer
          minimum: 1
          maximum: 100
          x-faker: 56
        status:
          type: string
          enum: [active, successful, failed]
      required:
        - raffleId
        - name
        - collectingTokenId
        - winnersCount
        - giftCount
        - deadline
        - goal
        - ticketPrice
        - soldTicketCount
        - status
