openapi: 3.0.0
info:
  title: Raffle Service API
  version: 1.0.0

paths:
  /startup:
    get:
      summary: Get startup configuration
      responses:
        '200':
          description: Startup configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartupResponse'

  /info:
    get:
      summary: Get service information
      responses:
        '200':
          description: Service info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

  /raffles:
    get:
      summary: Get raffle summaries
      parameters:
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: status
          schema:
            type: array
            items:
              type: string
              enum: [active, successful, failed]
          style: form
          explode: false
        - in: query
          name: token
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
        - in: query
          name: category
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: sort
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order, ascending or descending
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [Creation, Deadline]
          description: Field to sort by  
      responses:
        '200':
          description: Raffle list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RaffleSummaryResponse'
  /raffles/{raffleId}:
    get:
      summary: Get raffle details by ID
      parameters:
        - in: path
          name: raffleId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Raffle details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RaffleDetailResponse'
        '404':
          description: Raffle not found
  /raffles/{raffleId}/winner-baskets:
    get:
      summary: Get winner baskets of a raffle
      parameters:
        - in: path
          name: raffleId
          required: true
          schema:
            type: string

        - in: query
          name: offset
          schema:
            type: integer
            default: 0

        - in: query
          name: limit
          schema:
            type: integer
            default: 20

        - in: query
          name: type
          schema:
            type: string
            enum: [share, empty, gift, share_gift]
          description: Basket filter type

      responses:
        '200':
          description: Winner baskets list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WinnerBasketListResponse'

        '404':
          description: Raffle not found
  /raffles/{raffleId}/activities:
    get:
      summary: Get raffle activities
      parameters:
        - in: path
          name: raffleId
          required: true
          schema:
            type: string

        - in: query
          name: offset
          schema:
            type: integer
            default: 0

        - in: query
          name: limit
          schema:
            type: integer
            default: 10

        - in: query
          name: type
          description: Filter activity types
          schema:
            type: string
            enum: [raffle_created, ticket_bought, voted, gift_added]
          style: form
          explode: false

        - in: query
          name: onlyMyAddress
          description: Return only activities of the caller
          schema:
            type: boolean
            default: false

      responses:
        '200':
          description: Raffle activities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RaffleActivityResponse'
  /raffles/{raffleId}/winner-baskets/{basketId}:
    get:
      summary: Get details of a winner basket
      parameters:
        - in: path
          name: raffleId
          required: true
          schema:
            type: string
        - in: path
          name: basketId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Winner basket details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WinnerBasketDetailResponse'
        '404':
          description: Basket not found
components:
  schemas:
    #######################
    # Startup
    #######################
    StartupResponse:
      type: object
      properties:
        txFee:
          type: integer
          x-faker: 150000
        version:
          type: string
          x-faker: '1.0.0'
        verifiedTokens:
          type: array
          items:
            $ref: '#/components/schemas/VerifiedToken'
      required: [txFee, version, verifiedTokens]

    VerifiedToken:
      type: object
      properties:
        tokenId:
          type: string
          x-faker: b2dcea48caf0e73309138d659f6eb69d7ec8793dee989670c72dd4ffde7ebeb3
        name:
          type: string
          x-faker: rsBTC
      required: [tokenId, name]

    #######################
    # Info
    #######################
    InfoResponse:
      type: object
      properties:
        lastBlockHeight:
          type: integer
          x-faker: 123456
        health:
          type: string
          x-faker: healthy
        serviceFee:
          type: integer
          description: Percentage * 10 (e.g. 30 = 3%)
          x-faker: 30
        implementerFee:
          type: integer
          description: Percentage * 10 (e.g. 20 = 2%)
          x-faker: 20
        creationFee:
          type: integer
          x-faker: 20000000000
      required:
        - lastBlockHeight
        - health
        - serviceFee
        - implementerFee
        - creationFee

    #######################
    # Raffles
    #######################
    RaffleSummaryResponse:
      type: object
      properties:
        total:
          type: integer
          minimum: 1
          maximum: 1000
          x-faker: 23
        items:
          type: array
          items:
            $ref: '#/components/schemas/RaffleSummary'
      required: [total, items]

    RaffleSummary:
      type: object
      properties:
        raffleId:
          type: string
          x-faker: 22211bdba82c0251fed0a1301be40ae379790db99d769f291dceacdbc6a2fa7c
        name:
          type: string
          x-faker: Raffle 1
        description:
          type: string
          x-faker: Raffle 1 description
        image:
          type: string
          format: uri
          x-faker: https://x-faker.com/image.png
        collectingTokenId:
          type: string
        collectingTokenName:
          type: string
          minLength: 1
          maxLength: 5
          x-faker: rsBTC
        winnersCount:
          type: integer
          x-faker: 2
          minimum: 1
          maximum: 5
        giftCount:
          type: integer
          minimum: 1
          maximum: 5
          x-faker: 5
        tags:
          type: array
          items:
            type: string
        deadline:
          type: integer
          description: Unix timestamp (seconds)
          x-faker: 1718284800
        goal:
          type: integer
          minimum: 1
          maximum: 100
          x-faker: 1234567890
        ticketPrice:
          type: integer
          minimum: 1
          maximum: 100
          x-faker: 1000
        soldTicketCount:
          type: integer
          minimum: 1
          maximum: 100
          x-faker: 56
        status:
          type: string
          enum: [active, successful, failed]
      required:
        - raffleId
        - name
        - collectingTokenId
        - winnersCount
        - giftCount
        - deadline
        - goal
        - ticketPrice
        - soldTicketCount
        - status
    #######################
    # Raffle Detail
    #######################

    RaffleDetailResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
          minLength: 128
          maxLength: 256
        description:
          type: string
        images:
          type: array
          items:
            type: string
            format: uri
        collectingTokenId:
          type: string
          minLength: 128
          maxLength: 256
        collectingTokenName:
          type: string
          minLength: 1
          maxLength: 5
          x-faker: rsBTC
        missionFund:
          type: integer
          x-faker: 20
          minimum: 1
          maximum: 100
        serviceFee:
          type: integer
          x-faker: 20
          minimum: 1
          maximum: 100
        winnerPot:
          type: integer
          x-faker: 20
          minimum: 1
          maximum: 100
        trust:
          type: integer
          x-faker: 30
          minimum: 1
          maximum: 100
        voteCount:
          type: integer
          minimum: 1
          maximum: 1000
          x-faker: 200
        ticketBought:
          type: integer
          minimum: 1
          maximum: 60
          x-faker: 40
        backer:
          type: integer
          minimum: 1
          maximum: 60
          x-faker: 25
        deadline:
          type: integer
          description: Unix timestamp (seconds)
        goal:
          type: integer
          maximum: 100
          x-faker: 1000
        ticketPrice:
          type: integer
          minimum: 1
          maximum: 100
          x-faker: 1000
        soldTicketCount:
          type: integer
          minimum: 1
          maximum: 100
          x-faker: 56
      required:
        - id
        - name
        - collectingTokenId
        - deadline
        - goal
        - ticketPrice
        - soldTicketCount
    RafflePrize:
      type: object
      properties:
        prizeId:
          type: string
        name:
          type: string
        image:
          type: string
          format: uri
        amount:
          type: integer
      required:
        - prizeId
        - name

    
    #######################
    # Winner Baskets
    #######################
    WinnerBasketListResponse:
      type: object
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/WinnerBasket'
      required:
        - total
        - items

    WinnerBasket:
      type: object
      properties:
        basketId:
          type: string
        type:
          type: string
          enum: [empty, shared]
        shareAmount:
          type: number
          description: Calculated share amount
        sharePercent:
          type: number
          description: Calculated share percent
        gifts:
          type: array
          items:
            $ref: '#/components/schemas/BasketGiftSimple'
      required:
        - basketId
        - type
        - gifts
    #######################
    # Basket Gift
    #######################
    BasketGift:
      type: object
      properties:
        id:
          type: string
          description: Gift Id
        basketId:
          type: string
          description: Basket Id
        assets:
          type: array
          items:
            $ref: '#/components/schemas/GiftAsset'
      required:
        - id
        - basketId
        - assets
    
    #######################
    # Gift Asset
    #######################
    GiftAsset:
      type: object
      properties:
        tokenId:
          type: string
          description: Token Id
        tokenName:
          type: string
          description: Token Name
        amount:
          type: number
          description: Amount
      required:
        - tokenId
        - amount
    BasketGiftSimple:
      type: object
      properties:
        asset:
          type: string
        amount:
          type: number
        verified:
          type: boolean
      required:
        - asset
        - amount
        - verified

    #######################
    # Winner Basket Detail
    #######################
    WinnerBasketDetailResponse:
      type: object
      properties:
        basketId:
          type: string
        type:
          type: string
          enum: [empty, shared]
        sharePercent:
          type: number
          format: float
        shareAmount:
          type: number
        gifts:
          type: array
          items:
            $ref: '#/components/schemas/BasketGiftDetail'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/BasketTransaction'
      required:
        - basketId
        - type
        - gifts
        - transactions

    BasketGiftDetail:
      type: object
      properties:
        id:
          type: string
        basketId:
          type: string
        assets:
          type: array
          items:
            $ref: '#/components/schemas/GiftAsset'
        verified:
          type: boolean
      required:
        - id
        - assets
        - verified

    BasketTransaction:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [asset_unwrap, ticket_won, asset_added]
        amount:
          type: number
        wallet:
          type: string
        address:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - amount
        - wallet
        - address
        - createdAt

    #######################
    # Raffle Activity
    #######################
    RaffleActivityResponse:
      type: object
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/RaffleActivity'
      required:
        - total
        - items

    RaffleActivity:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - raffle_created
            - ticket_bought
            - upvoted
            - downvoted
            - basket_won
            - gift_added
            - raising_money
        address:
          type: string
        amount:
          type: number
          nullable: true
        basketNumber:
          type: string
          nullable: true
        basketType:
          type: string
        raffleName:
          type: string
          nullable: true
        raffleId:
          type: string
        createdAt:
          type: integer
      required:
        - id
        - type
        - address
        - createdAt